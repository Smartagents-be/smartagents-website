<svg viewBox="0 0 1584 396" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0ea5e9;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1584" height="396" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g stroke="rgba(99,102,241,0.06)" stroke-width="1">
    <line x1="0" y1="66" x2="1584" y2="66"/>
    <line x1="0" y1="132" x2="1584" y2="132"/>
    <line x1="0" y1="198" x2="1584" y2="198"/>
    <line x1="0" y1="264" x2="1584" y2="264"/>
    <line x1="0" y1="330" x2="1584" y2="330"/>
    <line x1="264" y1="0" x2="264" y2="396"/>
    <line x1="528" y1="0" x2="528" y2="396"/>
    <line x1="792" y1="0" x2="792" y2="396"/>
    <line x1="1056" y1="0" x2="1056" y2="396"/>
    <line x1="1320" y1="0" x2="1320" y2="396"/>
  </g>

  <!-- Decorative network nodes - left side -->
  <g fill="url(#brandGrad)" opacity="0.15">
    <circle cx="80" cy="60" r="4"/>
    <circle cx="200" cy="120" r="3"/>
    <circle cx="120" cy="180" r="5"/>
    <circle cx="60" cy="280" r="3"/>
    <circle cx="180" cy="320" r="4"/>
    <circle cx="250" cy="80" r="3"/>
    <circle cx="300" cy="240" r="4"/>
    <circle cx="150" cy="350" r="3"/>
  </g>
  <g stroke="url(#brandGrad)" stroke-width="1" opacity="0.1">
    <line x1="80" y1="60" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="120" y2="180"/>
    <line x1="120" y1="180" x2="60" y2="280"/>
    <line x1="60" y1="280" x2="180" y2="320"/>
    <line x1="80" y1="60" x2="250" y2="80"/>
    <line x1="250" y1="80" x2="200" y2="120"/>
    <line x1="120" y1="180" x2="300" y2="240"/>
    <line x1="180" y1="320" x2="150" y2="350"/>
  </g>

  <!-- Decorative network nodes - right side -->
  <g fill="url(#brandGrad)" opacity="0.15">
    <circle cx="1500" cy="80" r="4"/>
    <circle cx="1400" cy="150" r="3"/>
    <circle cx="1520" cy="220" r="5"/>
    <circle cx="1350" cy="300" r="3"/>
    <circle cx="1450" cy="350" r="4"/>
    <circle cx="1300" cy="100" r="3"/>
    <circle cx="1280" cy="250" r="4"/>
    <circle cx="1380" cy="60" r="3"/>
  </g>
  <g stroke="url(#brandGrad)" stroke-width="1" opacity="0.1">
    <line x1="1500" y1="80" x2="1400" y2="150"/>
    <line x1="1400" y1="150" x2="1520" y2="220"/>
    <line x1="1520" y1="220" x2="1350" y2="300"/>
    <line x1="1350" y1="300" x2="1450" y2="350"/>
    <line x1="1500" y1="80" x2="1380" y2="60"/>
    <line x1="1380" y1="60" x2="1300" y2="100"/>
    <line x1="1300" y1="100" x2="1280" y2="250"/>
    <line x1="1280" y1="250" x2="1350" y2="300"/>
  </g>

  <!-- Logo icon (centered, left of text) -->
  <g transform="translate(520,118) scale(3.5)">
    <!-- Connections -->
    <g stroke="url(#brandGrad)" stroke-width="1.5" fill="none" opacity="0.6">
      <line x1="24" y1="8" x2="12" y2="20"/>
      <line x1="24" y1="8" x2="36" y2="20"/>
      <line x1="12" y1="20" x2="24" y2="24"/>
      <line x1="36" y1="20" x2="24" y2="24"/>
      <line x1="12" y1="20" x2="12" y2="32"/>
      <line x1="36" y1="20" x2="36" y2="32"/>
      <line x1="24" y1="24" x2="24" y2="40"/>
      <line x1="12" y1="32" x2="24" y2="40"/>
      <line x1="36" y1="32" x2="24" y2="40"/>
    </g>
    <!-- Nodes -->
    <g fill="url(#brandGrad)">
      <circle cx="24" cy="8" r="4"/>
      <circle cx="12" cy="20" r="3"/>
      <circle cx="36" cy="20" r="3"/>
      <circle cx="24" cy="24" r="3.5"/>
      <circle cx="12" cy="32" r="2.5"/>
      <circle cx="36" cy="32" r="2.5"/>
      <circle cx="24" cy="40" r="3"/>
    </g>
    <circle cx="24" cy="8" r="6" fill="none" stroke="url(#brandGrad)" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- SmartAgents text -->
  <text x="730" y="220" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="700" font-size="72" fill="url(#brandGrad)">SmartAgents</text>

  <!-- Tagline -->
  <text x="732" y="265" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="400" font-size="24" fill="#94a3b8">Digitale collega's die nooit slapen.</text>

  <!-- Gradient accent line -->
  <rect x="350" y="370" width="884" height="2" rx="1" fill="url(#lineGrad)"/>
</svg>
