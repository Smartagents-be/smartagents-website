<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="rv-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1226"/>
      <stop offset="50%" stop-color="#0a1626"/>
      <stop offset="100%" stop-color="#062420"/>
    </linearGradient>
    <linearGradient id="rv-seam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e8d8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00e8d8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#00e8d8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="rv-blue" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7090f8"/>
      <stop offset="100%" stop-color="#2040b0"/>
    </radialGradient>
    <radialGradient id="rv-teal" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#80fff8"/>
      <stop offset="100%" stop-color="#00b8a8"/>
    </radialGradient>
    <radialGradient id="rv-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00e8d8" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#00c8b8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#00a090" stop-opacity="0"/>
    </radialGradient>
    <filter id="rv-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="rv-soft" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#rv-bg)"/>

  <!-- ===== LEFT: RPA — rigid, linear, mechanical ===== -->
  <g stroke="#5b6a92" stroke-width="1.4" fill="none" opacity="0.85">
    <line x1="70" y1="225" x2="320" y2="225"/>
    <!-- vertical step ticks -->
    <line x1="120" y1="218" x2="120" y2="232"/>
    <line x1="200" y1="218" x2="200" y2="232"/>
    <line x1="280" y1="218" x2="280" y2="232"/>
  </g>
  <g fill="#1a2440" stroke="#6f80ad" stroke-width="1.6">
    <rect x="58" y="201" width="48" height="48" rx="4"/>
    <rect x="138" y="201" width="48" height="48" rx="4"/>
    <rect x="218" y="201" width="48" height="48" rx="4"/>
    <rect x="298" y="201" width="48" height="48" rx="4"/>
  </g>
  <!-- gear-ish dots inside the rigid blocks -->
  <g fill="#8a9ccb">
    <circle cx="82" cy="225" r="4"/>
    <circle cx="162" cy="225" r="4"/>
    <circle cx="242" cy="225" r="4"/>
    <circle cx="322" cy="225" r="4"/>
  </g>
  <!-- secondary fixed rail -->
  <g stroke="#46517a" stroke-width="1" stroke-dasharray="4 6" fill="none" opacity="0.7">
    <line x1="58" y1="300" x2="346" y2="300"/>
    <line x1="58" y1="150" x2="346" y2="150"/>
  </g>

  <!-- ===== SEAM ===== -->
  <rect x="398" y="40" width="4" height="370" fill="url(#rv-seam)"/>
  <circle cx="400" cy="225" r="70" fill="url(#rv-bloom)" filter="url(#rv-soft)"/>

  <!-- ===== RIGHT: AGENTS — organic, branching ===== -->
  <g stroke="#3fd0d0" stroke-width="1" stroke-opacity="0.55">
    <line x1="470" y1="225" x2="560" y2="120"/>
    <line x1="470" y1="225" x2="600" y2="210"/>
    <line x1="470" y1="225" x2="540" y2="330"/>
    <line x1="600" y1="210" x2="700" y2="135"/>
    <line x1="600" y1="210" x2="730" y2="250"/>
    <line x1="560" y1="120" x2="660" y2="78"/>
    <line x1="540" y1="330" x2="650" y2="360"/>
    <line x1="730" y1="250" x2="650" y2="360"/>
    <line x1="600" y1="210" x2="540" y2="330"/>
  </g>
  <g fill="#bff7ff" opacity="0.5">
    <circle cx="515" cy="172" r="1.7"/>
    <circle cx="650" cy="172" r="1.7"/>
    <circle cx="665" cy="305" r="1.6"/>
  </g>
  <g>
    <circle cx="470" cy="225" r="13" fill="url(#rv-teal)" filter="url(#rv-glow)"/><circle cx="465" cy="220" r="4.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="560" cy="120" r="9" fill="url(#rv-blue)" filter="url(#rv-glow)"/><circle cx="560" cy="120" r="4" fill="#9aabff"/>
    <circle cx="600" cy="210" r="10" fill="url(#rv-blue)" filter="url(#rv-glow)"/><circle cx="600" cy="210" r="4.5" fill="#9aabff"/>
    <circle cx="540" cy="330" r="9" fill="url(#rv-blue)" filter="url(#rv-glow)"/><circle cx="540" cy="330" r="4" fill="#9aabff"/>
    <circle cx="700" cy="135" r="7" fill="url(#rv-teal)" filter="url(#rv-glow)"/><circle cx="700" cy="135" r="3" fill="#bff0fa"/>
    <circle cx="730" cy="250" r="9" fill="url(#rv-blue)" filter="url(#rv-glow)"/><circle cx="730" cy="250" r="4" fill="#9aabff"/>
    <circle cx="660" cy="78" r="6" fill="url(#rv-teal)" filter="url(#rv-glow)"/><circle cx="660" cy="78" r="2.4" fill="#bff0fa"/>
    <circle cx="650" cy="360" r="8" fill="url(#rv-blue)" filter="url(#rv-glow)"/><circle cx="650" cy="360" r="3.5" fill="#9aabff"/>
  </g>
</svg>
