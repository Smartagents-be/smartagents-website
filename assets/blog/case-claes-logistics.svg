<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img">
  <defs>
    <linearGradient id="cl-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1430"/>
      <stop offset="55%" stop-color="#08182c"/>
      <stop offset="100%" stop-color="#062420"/>
    </linearGradient>
    <linearGradient id="cl-route" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a6cf0"/>
      <stop offset="55%" stop-color="#00c8c0"/>
      <stop offset="100%" stop-color="#80fff8"/>
    </linearGradient>
    <linearGradient id="cl-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d8c8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00d8c8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="cl-blue" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7090f8"/>
      <stop offset="100%" stop-color="#2040b0"/>
    </radialGradient>
    <radialGradient id="cl-teal" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#80fff8"/>
      <stop offset="100%" stop-color="#00b8a8"/>
    </radialGradient>
    <filter id="cl-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cl-soft" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#cl-bg)"/>

  <!-- faint grid floor -->
  <g stroke="#1c3050" stroke-width="1" opacity="0.5">
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="220" x2="800" y2="220"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- area under the rising savings route -->
  <path d="M90 360 C 220 350 270 300 360 286 C 470 268 520 190 640 150 C 690 134 720 118 740 108 L 740 410 L 90 410 Z" fill="url(#cl-fill)"/>

  <!-- glow behind the destination -->
  <circle cx="740" cy="108" r="80" fill="#00d8c8" opacity="0.16" filter="url(#cl-soft)"/>

  <!-- the rising route: hubs over time, climbing = hours saved -->
  <path d="M90 360 C 220 350 270 300 360 286 C 470 268 520 190 640 150 C 690 134 720 118 740 108" fill="none" stroke="url(#cl-route)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- branch feeder routes -->
  <g stroke="#2f8fbf" stroke-width="1.1" stroke-opacity="0.5" stroke-dasharray="5 7" fill="none">
    <path d="M360 286 C 320 230 300 200 250 170"/>
    <path d="M640 150 C 600 210 580 250 520 300"/>
  </g>

  <!-- waypoint packages -->
  <g fill="#16294a" stroke="#5fb0d8" stroke-width="1.4">
    <rect x="240" y="158" width="22" height="22" rx="3"/>
    <rect x="508" y="288" width="22" height="22" rx="3"/>
  </g>

  <!-- hub nodes along the route -->
  <g>
    <circle cx="90" cy="360" r="9" fill="url(#cl-blue)" filter="url(#cl-glow)"/><circle cx="90" cy="360" r="4" fill="#9aabff"/>
    <circle cx="360" cy="286" r="11" fill="url(#cl-blue)" filter="url(#cl-glow)"/><circle cx="360" cy="286" r="5" fill="#9aabff"/>
    <circle cx="640" cy="150" r="11" fill="url(#cl-blue)" filter="url(#cl-glow)"/><circle cx="640" cy="150" r="5" fill="#9aabff"/>
    <!-- destination / savings peak -->
    <circle cx="740" cy="108" r="16" fill="url(#cl-teal)" filter="url(#cl-glow)"/>
    <circle cx="734" cy="102" r="5.5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- tiny ascending markers -->
  <g fill="#bff7ff" opacity="0.55">
    <circle cx="225" cy="320" r="1.8"/>
    <circle cx="470" cy="226" r="1.8"/>
    <circle cx="690" cy="128" r="1.6"/>
  </g>
</svg>
